<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>404 — Page Not Found | MyCareerJob.in</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💼</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Mukta:wght@400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<header class="hdr" id="hdr">
  <div class="hdr-inner">
    <a href="index.html" class="logo"><span class="logo-ico">💼</span>MyCareerJob<span>.in</span></a>
    <nav class="nav"><a href="index.html">Home</a><a href="jobs.html">All Jobs</a></nav>
  </div>
</header>
<div style="min-height:80vh;display:flex;align-items:center;justify-content:center;text-align:center;padding:100px 24px 60px">
  <div>
    <div style="font-size:5rem;margin-bottom:20px">😕</div>
    <h1 style="font-family:var(--head);font-size:2.5rem;font-weight:800;margin-bottom:12px">404 — Page Not Found</h1>
    <p style="color:var(--muted);font-size:1.1rem;margin-bottom:32px;max-width:480px;margin-left:auto;margin-right:auto">The page you're looking for doesn't exist or has been moved. Let's get you back on track!</p>
    <div style="display:flex;gap:14px;justify-content:center;flex-wrap:wrap">
      <a href="index.html" style="background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;padding:13px 28px;border-radius:24px;font-weight:700;font-size:.95rem">🏠 Go Home</a>
      <a href="jobs.html" style="background:#fff;border:2px solid var(--orange);color:var(--orange);padding:13px 28px;border-radius:24px;font-weight:700;font-size:.95rem">💼 Browse Jobs</a>
    </div>
    <div style="margin-top:48px;padding:24px;background:#fff;border-radius:16px;max-width:480px;margin-left:auto;margin-right:auto;box-shadow:0 4px 16px rgba(0,0,0,.08)">
      <p style="font-weight:600;margin-bottom:12px">🔥 Popular Job Categories</p>
      <div style="display:flex;flex-wrap:wrap;gap:8px;justify-content:center">
        <a href="jobs.html?cat=Govt" style="padding:6px 14px;background:#f3f4f6;border-radius:16px;font-size:.85rem">🏛️ Govt Jobs</a>
        <a href="jobs.html?cat=IT" style="padding:6px 14px;background:#f3f4f6;border-radius:16px;font-size:.85rem">💻 IT Jobs</a>
        <a href="jobs.html?cat=Bank" style="padding:6px 14px;background:#f3f4f6;border-radius:16px;font-size:.85rem">🏦 Bank Jobs</a>
        <a href="jobs.html?cat=Railway" style="padding:6px 14px;background:#f3f4f6;border-radius:16px;font-size:.85rem">🚂 Railway</a>
        <a href="jobs.html?cat=Police" style="padding:6px 14px;background:#f3f4f6;border-radius:16px;font-size:.85rem">👮 Police</a>
      </div>
    </div>
  </div>
</div>
<script>window.addEventListener('scroll',()=>document.getElementById('hdr')?.classList.toggle('scrolled',scrollY>20));</script>
</body>
</html>
