<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Contact Us — MyCareerJob.in</title>
  <meta name="description" content="Contact MyCareerJob.in team for job portal queries, partnerships, or feedback."/>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>💼</text></svg>"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;700;800&family=Mukta:wght@400;500;600&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="css/style.css"/>
</head>
<body>
<div id="particles"></div>
<header class="hdr" id="hdr">
  <div class="hdr-inner">
    <a href="index.html" class="logo"><span class="logo-ico">💼</span>MyCareerJob<span>.in</span></a>
    <nav class="nav" id="nav">
      <a href="index.html">Home</a><a href="jobs.html">All Jobs</a><a href="marathi.html">मराठी</a>
      <a href="index.html#alerts" class="cta">🔔 Alerts</a>
    </nav>
    <button class="burger" id="burger"><span></span><span></span><span></span></button>
  </div>
</header>

<div style="padding:100px 24px 60px;max-width:800px;margin:0 auto">
  <h1 style="font-family:var(--head);font-size:2rem;font-weight:800;margin-bottom:12px">📬 Contact Us</h1>
  <p style="color:var(--muted);margin-bottom:36px">Have questions, feedback, or partnership inquiries? We'd love to hear from you.</p>
  <div style="display:grid;grid-template-columns:1fr 1fr;gap:20px;margin-bottom:36px">
    <div style="background:#fff;border-radius:16px;padding:24px;box-shadow:var(--shadow)">
      <div style="font-size:2rem;margin-bottom:10px">📧</div>
      <h3 style="font-family:var(--head);margin-bottom:6px">Email</h3>
      <a href="mailto:admin@mycareerjob.in" style="color:var(--orange)">admin@mycareerjob.in</a>
    </div>
    <div style="background:#fff;border-radius:16px;padding:24px;box-shadow:var(--shadow)">
      <div style="font-size:2rem;margin-bottom:10px">📱</div>
      <h3 style="font-family:var(--head);margin-bottom:6px">Telegram</h3>
      <a href="https://t.me/mycareerjob" style="color:var(--orange)">@mycareerjob</a>
    </div>
  </div>
  <div style="background:#fff;border-radius:16px;padding:28px;box-shadow:var(--shadow)">
    <h3 style="font-family:var(--head);font-size:1.2rem;margin-bottom:18px">Send a Message</h3>
    <form onsubmit="event.preventDefault();alert('Message sent! We will reply within 24 hours.')">
      <div style="margin-bottom:14px"><label style="display:block;font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">Your Name</label><input type="text" required style="width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:10px;font-size:.92rem;outline:none" placeholder="Enter your name"/></div>
      <div style="margin-bottom:14px"><label style="display:block;font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">Email Address</label><input type="email" required style="width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:10px;font-size:.92rem;outline:none" placeholder="your@email.com"/></div>
      <div style="margin-bottom:14px"><label style="display:block;font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">Subject</label><input type="text" required style="width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:10px;font-size:.92rem;outline:none" placeholder="Job listing query, Partnership, etc."/></div>
      <div style="margin-bottom:18px"><label style="display:block;font-size:.82rem;font-weight:600;color:var(--muted);margin-bottom:6px;text-transform:uppercase;letter-spacing:.05em">Message</label><textarea rows="5" required style="width:100%;padding:10px 14px;border:2px solid var(--border);border-radius:10px;font-size:.92rem;outline:none;resize:vertical" placeholder="Your message..."></textarea></div>
      <button type="submit" style="background:linear-gradient(135deg,var(--orange),var(--orange2));color:#fff;padding:12px 28px;border-radius:24px;font-weight:700;font-size:.95rem;border:none;cursor:pointer">Send Message →</button>
    </form>
  </div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-bottom"><p>© 2025 MyCareerJob.in — All Rights Reserved</p></div>
  </div>
</footer>
<button id="btt" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>
<script>
  document.getElementById('burger')?.addEventListener('click',()=>{document.getElementById('burger').classList.toggle('open');document.getElementById('nav').classList.toggle('open');});
  window.addEventListener('scroll',()=>{document.getElementById('hdr')?.classList.toggle('scrolled',scrollY>20);document.getElementById('btt')?.classList.toggle('show',scrollY>400);});
  const c=document.getElementById('particles');for(let i=0;i<10;i++){const p=document.createElement('div');p.className='pt';p.style.cssText=`left:${Math.random()*100}%;width:${Math.random()*3+2}px;height:${Math.random()*3+2}px;animation-duration:${Math.random()*14+9}s;animation-delay:${Math.random()*9}s;opacity:.07`;c.appendChild(p);}
</script>
</body>
</html>
